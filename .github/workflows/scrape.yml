name: Scheduled Scrape

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC every day - adjust to taste
  workflow_dispatch: {}     # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the pipeline (scrape -> clean -> dedupe -> store)
        run: python pipeline.py

      - name: Commit updated data back to the repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.db data/articles.csv
          git diff --quiet --cached || git commit -m "Automated scrape update [skip ci]"
          git push

      - name: Ask the live dashboard to pull the update
        if: always()
        run: |
          curl -s -f "${{ vars.DASHBOARD_URL }}/sync?token=${{ secrets.SYNC_TOKEN }}" \
            || echo "Sync ping failed or DASHBOARD_URL/SYNC_TOKEN not set yet - safe to ignore until deployment is live."
